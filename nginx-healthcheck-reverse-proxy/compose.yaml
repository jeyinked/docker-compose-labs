services:
  api:
    image: python:3
    working_dir: /app
    volumes:
      - ${PWD}/api:/app
    command: python app.py
    networks:
      - health_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 30s
      timeout: 10s
      retries: 3




  nginx:
    image: nginx
    ports:
      - "8084:80"
    depends_on:
      - api
    networks:
      - health_network
    volumes:
      - ${PWD}/nginx.conf:/etc/nginx/conf.d/default.conf


networks:
  health_network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.40.0.0/24
