services:
  api:
   image: python:3
   working_dir: /app
   volumes:
     - ${PWD}/api:/app
   command: python app.py
   networks:
     - scale_network

  nginx:
    image: nginx
    container_name: proxy_container
    ports:
      - "8085:80"
    volumes:
      - ${PWD}/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - scale_network
    depends_on:
      - api

networks:
  scale_network:
     driver: bridge
     ipam:
       config:
         - subnet:  10.50.0.0/24
