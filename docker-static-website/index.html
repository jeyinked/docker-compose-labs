<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker Lab</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1e293b, #020617);
      color: white;
    }

    .card {
      width: 90%;
      max-width: 720px;
      padding: 48px;
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.85);
      box-shadow: 0 0 60px rgba(56, 189, 248, 0.25);
      text-align: center;
      border: 1px solid rgba(148, 163, 184, 0.2);
    }

    .badge {
      display: inline-block;
      padding: 8px 16px;
      margin-bottom: 24px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.15);
      color: #86efac;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      background: linear-gradient(90deg, #38bdf8, #22c55e);
      -webkit-background-clip: text;
      color: transparent;
    }

    p {
      margin: 24px auto 0;
      max-width: 540px;
      color: #94a3b8;
      font-size: 1.1rem;
      line-height: 1.6;
    }

    .footer {
      margin-top: 32px;
      font-size: 0.9rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">Container Running</div>
    <h1>Docker Lab</h1>
    <p>
      This page is served from a containerized Nginx environment using Docker and Docker Compose.
    </p>
    <div class="footer">
      🚀 Built for container learning
    </div>
  </main>
</body>
</html>
