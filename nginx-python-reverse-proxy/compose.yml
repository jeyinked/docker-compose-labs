services:
  api:
    image: python:3
    container_name: api_container
    working_dir: /app
    volumes:
      - ${PWD}/api:/app
    command: python app.py
    environment:
      - APP_ENV=dev
    networks:
      - backend_network


  nginx:
    image: nginx
    container_name: proxy_container
    volumes:
      - ${PWD}/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8083:80"
    depends_on:
      - api
    networks:
      - backend_network



networks:
  backend_network:
    driver:  bridge
    ipam:
      config:
        - subnet: 10.20.0.0/24
