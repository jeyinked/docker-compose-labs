
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Site 1</title>
<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #0f172a, #020617);
  font-family: Arial, sans-serif;
  color: white;
}

.card {
  padding: 40px;
  border-radius: 20px;
  background: rgba(15, 23, 42, 0.8);
  box-shadow: 0 0 40px rgba(56, 189, 248, 0.3);
  text-align: center;
}

h1 {
  font-size: 3em;
  background: linear-gradient(90deg, #38bdf8, #22c55e);
  -webkit-background-clip: text;
  color: transparent;
}

p {
  color: #94a3b8;
}
</style>
</head>
<body>
  <div class="card">
    <h1>🚀 Site 1</h1>
    <p>Premier conteneur Docker actif</p>
  </div>
</body>
</html>
